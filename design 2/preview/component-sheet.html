<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: linear-gradient(135deg, oklch(0.3 0.1 320 / 0.6), oklch(0.2 0.08 340 / 0.7)); height: 300px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
  .sheet {
    background: var(--bg-surface); border-radius: 28px; padding: 24px 24px 20px;
    width: 380px; box-shadow: var(--shadow-xl);
    display: flex; flex-direction: column; gap: 12px;
    position: relative; overflow: hidden;
  }
  .grab { width: 36px; height: 4px; border-radius: 999px; background: var(--neutral-300); margin: -8px auto 8px; }
  .ic { width: 56px; height: 56px; border-radius: 16px; background: var(--grad-soft); display: flex; align-items: center; justify-content: center; color: var(--magenta-700); }
  .ic svg { width: 28px; height: 28px; stroke-width: 1.75; }
  .title { font-family: var(--font-display); font-weight: 500; font-size: 32px; line-height: 1; letter-spacing: -0.02em; color: var(--fg-1); }
  .title em { font-style: normal; color: var(--magenta-600); }
  .desc { font-family: var(--font-sans); font-size: 15px; line-height: 1.5; color: var(--fg-2); }
  .actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn { flex: 1; font-family: var(--font-sans); font-size: 14px; font-weight: 600; border: none; border-radius: 999px; padding: 14px 0; cursor: pointer; }
  .btn-prim { background: var(--magenta-500); color: white; }
  .btn-ghost { background: transparent; color: var(--fg-2); border: 1px solid var(--border-default); }
</style></head>
<body>
  <div class="sheet">
    <div class="grab"></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 10,18 20,6"/></svg></div>
    <div class="title">את <em>בפנים.</em></div>
    <div class="desc">אישור הגעה אושר לחמישי. נשלח את הכתובת שעה לפני — והארוחה על המייסד.</div>
    <div class="actions">
      <button class="btn btn-ghost">הוסיפו ליומן</button>
      <button class="btn btn-prim">לפרטים</button>
    </div>
  </div>
</body></html>
