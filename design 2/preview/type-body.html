<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 36px; background: var(--bg-canvas); height: 240px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .row .label { width: 100px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); direction: ltr; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 0; }
  .body-lg { font-family: var(--font-sans); font-size: 17px; line-height: 1.55; color: var(--fg-1); font-weight: 400; }
  .body    { font-family: var(--font-sans); font-size: 15px; line-height: 1.55; color: var(--fg-1); font-weight: 400; }
  .body-sm { font-family: var(--font-sans); font-size: 13px; line-height: 1.5; color: var(--fg-2); font-weight: 400; }
  .caption { font-family: var(--font-sans); font-size: 11px; line-height: 1.4; color: var(--fg-3); letter-spacing: 0.04em; font-weight: 600; }
</style></head>
<body>
  <div class="head">גוף — Heebo</div>
  <div class="row"><span class="label">Body L · 17</span><span class="body-lg">חברים מקבלים גישה ראשונה לארוחות, פתיחות ולמשהו לא צפוי מדי פעם.</span></div>
  <div class="row"><span class="label">Body · 15</span><span class="body">אישור הגעה נסגר בשש. הביאו אורח אחד — נשלח את הכתובת שעה לפני.</span></div>
  <div class="row"><span class="label">Body S · 13</span><span class="body-sm">שבעה חברים אישרו. הצ׳ק-אין האחרון היה לפני 12 דקות.</span></div>
  <div class="row"><span class="label">Caption · 11</span><span class="caption">חברים בלבד · נוסד 2026</span></div>
</body></html>
