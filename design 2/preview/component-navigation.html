<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); height: 260px; box-sizing: border-box; display: flex; gap: 28px; align-items: center; justify-content: center; }
  .tabbar {
    width: 280px; background: var(--bg-overlay); backdrop-filter: blur(12px);
    border: 1px solid var(--border-subtle); border-radius: 999px;
    padding: 8px; display: flex; gap: 4px; box-shadow: var(--shadow-lg);
  }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; border-radius: 999px; cursor: pointer; color: var(--fg-3); }
  .tab svg { width: 20px; height: 20px; stroke-width: 1.75; }
  .tab .lbl { font-family: var(--font-sans); font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
  .tab.active { background: var(--neutral-900); color: white; }
  .topnav {
    background: var(--bg-surface); border-radius: 18px;
    border: 1px solid var(--border-subtle);
    padding: 14px 18px; display: flex; flex-direction: column; gap: 12px;
    width: 280px;
  }
  .greeting { font-family: var(--font-display); font-weight: 500; font-size: 26px; letter-spacing: -0.02em; color: var(--fg-1); }
  .greeting em { font-style: normal; color: var(--magenta-600); }
  .pills { display: flex; gap: 8px; }
  .pill { font-family: var(--font-sans); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 999px; background: var(--bg-sunken); color: var(--fg-2); cursor: pointer; }
  .pill.active { background: var(--neutral-900); color: white; }
</style></head>
<body>
  <div class="topnav">
    <div class="greeting">היי, <em>עדה.</em></div>
    <div class="pills">
      <div class="pill active">הערב</div>
      <div class="pill">שבוע</div>
      <div class="pill">חודש</div>
    </div>
  </div>
  <div class="tabbar">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m3 12 9-9 9 9M5 10v10h14V10"/></svg>
      <span class="lbl">בית</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
      <span class="lbl">אירועים</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="8" cy="12" r="1.5"/><path d="M11 12h6"/></svg>
      <span class="lbl">כרטיס</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 9 7H4l4 4-2 7 6-4 6 4-2-7 4-4h-5z"/></svg>
      <span class="lbl">הטבות</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      <span class="lbl">אני</span>
    </div>
  </div>
</body></html>
