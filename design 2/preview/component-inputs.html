<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); height: 280px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; align-content: center; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fg-2); }
  .input {
    font-family: var(--font-sans); font-size: 15px; color: var(--fg-1);
    background: var(--bg-surface); border: 1px solid var(--border-default);
    border-radius: 12px; padding: 12px 14px; outline: none;
    transition: all 200ms var(--ease-out);
  }
  .input.focused { border-color: var(--magenta-500); box-shadow: var(--shadow-glow); }
  .input.error { border-color: var(--danger-500); }
  .input::placeholder { color: var(--fg-4); }
  .help { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); }
  .help.err { color: var(--danger-500); }
  .search { display: flex; align-items: center; gap: 10px; background: var(--bg-sunken); border-radius: 12px; padding: 10px 14px; border: 1px solid transparent; }
  .search input { background: transparent; border: none; outline: none; font: inherit; font-family: var(--font-sans); font-size: 14px; flex: 1; color: var(--fg-1); }
  .search svg { stroke: var(--fg-3); width: 16px; height: 16px; }
</style></head>
<body>
  <div class="field">
    <div class="label">אימייל</div>
    <input class="input" value="ada@kivunim.club" dir="ltr" />
    <div class="help">נשלח SMS עם הכתובת שעה לפני האירוע.</div>
  </div>
  <div class="field">
    <div class="label">מספר חבר</div>
    <input class="input focused" value="KVN-2K6-4F71" style="font-family: var(--font-mono); letter-spacing: 0.04em" dir="ltr" />
    <div class="help">מיקוד עם הילת מגנטה.</div>
  </div>
  <div class="field">
    <div class="label">חיפוש</div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input placeholder="חיפוש אירועים, הטבות, חברים…" />
    </div>
    <div class="help">רקע שקוע, ללא מסגרת במנוחה.</div>
  </div>
  <div class="field">
    <div class="label">אימייל להזמנה</div>
    <input class="input error" value="לא-אימייל" />
    <div class="help err">זה לא נראה כמו אימייל. ננסה שוב?</div>
  </div>
</body></html>
