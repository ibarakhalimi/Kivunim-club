<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .num { font-family: var(--font-mono); font-size: 38px; color: var(--fg-1); font-weight: 500; letter-spacing: -0.02em; direction: ltr; }
  .id { font-family: var(--font-mono); font-size: 15px; color: var(--magenta-700); direction: ltr; }
  .code { font-family: var(--font-mono); font-size: 13px; color: var(--fg-2); background: var(--bg-sunken); padding: 6px 10px; border-radius: 8px; direction: ltr; }
  .meta { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin-top: 4px; }
</style></head>
<body>
  <div class="head">מספרים — JetBrains Mono</div>
  <div class="row">
    <span class="num">0042 · 04/12/26</span>
    <span class="id">KVN-2K6-4F71</span>
    <span class="code">--magenta-500</span>
  </div>
  <div class="meta">מספרי חברים · תאריכים · קודים · משתני CSS · נתונים מספריים</div>
</body></html>
