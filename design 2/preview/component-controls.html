<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); height: 280px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; align-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); grid-column: 1 / -1; }
  .toggle { width: 44px; height: 26px; border-radius: 999px; background: var(--neutral-300); position: relative; transition: background 200ms var(--ease-out); cursor: pointer; }
  .toggle::after { content: ""; position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; border-radius: 999px; background: white; box-shadow: var(--shadow-sm); transition: right 200ms var(--ease-out); }
  .toggle.on { background: var(--magenta-500); }
  .toggle.on::after { right: 21px; }
  .check { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--border-strong); background: white; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .check.on { background: var(--magenta-500); border-color: var(--magenta-500); }
  .check svg { width: 14px; height: 14px; stroke: white; stroke-width: 3; fill: none; }
  .check:not(.on) svg { display: none; }
  .radio { width: 22px; height: 22px; border-radius: 999px; border: 1.5px solid var(--border-strong); background: white; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .radio.on { border-color: var(--magenta-500); border-width: 6px; }
  .seg { display: inline-flex; padding: 4px; background: var(--bg-sunken); border-radius: 12px; gap: 2px; }
  .seg button { font-family: var(--font-sans); font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 8px; border: none; background: transparent; color: var(--fg-2); cursor: pointer; }
  .seg button.active { background: white; color: var(--fg-1); box-shadow: var(--shadow-sm); }
  .item { display: flex; align-items: center; gap: 12px; }
  .item .lbl { font-family: var(--font-sans); font-size: 14px; color: var(--fg-1); }
  .item .sub { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); }
  .col { display: flex; flex-direction: column; gap: 14px; }
</style></head>
<body>
  <div class="head">בקרות — מתגים, בחירה, מקטעים</div>
  <div class="col">
    <div class="item"><div class="toggle on"></div><div><div class="lbl">התראות על אירועים חדשים</div><div class="sub">SMS + פוש</div></div></div>
    <div class="item"><div class="toggle"></div><div><div class="lbl">הצג אותי כמשתתפת בפומבי</div></div></div>
    <div class="item">
      <div class="check on"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 10,18 20,6"/></svg></div>
      <div class="lbl">אני מסכימה לכללי הבית</div>
    </div>
    <div class="item"><div class="check"></div><div class="lbl">תמיד הביאו +1 כברירת מחדל</div></div>
  </div>
  <div class="col">
    <div class="item"><div class="radio on"></div><div class="lbl">ליבה — ₪89 לחודש</div></div>
    <div class="item"><div class="radio"></div><div class="lbl">פריים — ₪179 לחודש</div></div>
    <div class="item">
      <div class="seg">
        <button>שבוע</button>
        <button class="active">חודש</button>
        <button>הכל</button>
      </div>
    </div>
  </div>
</body></html>
