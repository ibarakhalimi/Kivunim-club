<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); height: 280px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .group { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 18px; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; transition: background 200ms; }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--bg-sunken); }
  .ic { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-tint); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--magenta-600); }
  .ic svg { width: 18px; height: 18px; stroke-width: 1.75; }
  .body { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .title { font-family: var(--font-sans); font-size: 14px; font-weight: 550; color: var(--fg-1); }
  .sub { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); }
  .right { font-family: var(--font-sans); font-size: 13px; color: var(--fg-3); display: flex; align-items: center; gap: 6px; }
  .right svg { width: 14px; height: 14px; stroke: var(--fg-4); stroke-width: 2; transform: scaleX(-1); }
  .badge { background: var(--magenta-100); color: var(--magenta-700); font-family: var(--font-sans); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
</style></head>
<body>
  <div class="head">שורות רשימה</div>
  <div class="group">
    <div class="row">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg></div>
      <div class="body"><div class="title">אירועים קרובים</div><div class="sub">3 השבוע, 12 החודש</div></div>
      <div class="right"><span class="badge">3</span><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor"/></svg></div>
    </div>
    <div class="row">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 9 7H4l4 4-2 7 6-4 6 4-2-7 4-4h-5z"/></svg></div>
      <div class="body"><div class="title">הטבות ובונוסים</div><div class="sub">47 פתוחות ברמה שלך</div></div>
      <div class="right">47<svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor"/></svg></div>
    </div>
    <div class="row">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6M19 8v6"/></svg></div>
      <div class="body"><div class="title">הזמינו חבר/ה</div><div class="sub">2 הזמנות נותרו החודש</div></div>
      <div class="right"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor"/></svg></div>
    </div>
  </div>
</body></html>
