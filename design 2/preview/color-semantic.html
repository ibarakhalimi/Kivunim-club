<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); direction: ltr; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex: 1; }
  .tile { border-radius: 14px; padding: 12px 14px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-subtle); }
  .tile .name2 { font-family: var(--font-sans); font-size: 13px; font-weight: 600; }
  .tile .var { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; direction: ltr; }
  .tile .dot { width: 12px; height: 12px; border-radius: 4px; }
</style></head>
<body>
  <div class="head"><div class="name">מצבי מערכת</div><div class="meta">הצלחה · אזהרה · סכנה · מידע</div></div>
  <div class="grid">
    <div class="tile" style="background:var(--success-bg); color: oklch(0.40 0.15 155)">
      <div class="dot" style="background:var(--success-500)"></div>
      <div><div class="name2">הצלחה</div><div class="var">--success-500</div></div>
    </div>
    <div class="tile" style="background:var(--warning-bg); color: oklch(0.40 0.15 75)">
      <div class="dot" style="background:var(--warning-500)"></div>
      <div><div class="name2">אזהרה</div><div class="var">--warning-500</div></div>
    </div>
    <div class="tile" style="background:var(--danger-bg); color: oklch(0.40 0.18 25)">
      <div class="dot" style="background:var(--danger-500)"></div>
      <div><div class="name2">סכנה</div><div class="var">--danger-500</div></div>
    </div>
    <div class="tile" style="background:var(--info-bg); color: oklch(0.40 0.15 250)">
      <div class="dot" style="background:var(--info-500)"></div>
      <div><div class="name2">מידע</div><div class="var">--info-500</div></div>
    </div>
  </div>
</body></html>
