<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</helmet>

<div dir="rtl" style="min-height:100vh; background:#0F1016; font-family:'Rubik',sans-serif; padding:48px; display:flex; align-items:flex-start; justify-content:center;">

  <div dir="rtl" style="width:390px; height:844px; background:#181A23; border-radius:46px; overflow:hidden; position:relative; box-shadow:0 30px 70px rgba(0,0,0,.5); color:#fff;">
    <!-- status bar -->
    <div style="height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 32px 0 28px;">
      <div style="display:flex; align-items:center; gap:7px;">
        <span style="font-size:13px; font-weight:700;">61</span>
        <div style="width:22px; height:11px; border:1.6px solid #fff; border-radius:3px; position:relative; opacity:.9;"><div style="position:absolute; inset:1.5px; right:1.5px; width:60%; background:#fff; border-radius:1px;"></div></div>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M3 6.5C4.4 5 6.1 4.2 8 4.2 9.9 4.2 11.6 5 13 6.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><path d="M1 4C2.9 2.1 5.3 1 8 1c2.7 0 5.1 1.1 7 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity=".55"/></svg>
      </div>
      <span style="font-size:16px; font-weight:700; letter-spacing:.5px;">15:19</span>
    </div>

    <!-- header -->
    <div style="padding:6px 22px 14px; display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="display:flex; align-items:center; gap:8px; background:#FF2E9A; color:#fff; padding:11px 18px; border-radius:24px; font-weight:700; font-size:15px;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2.2"/><path d="M16.5 16.5L21 21" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
          חיפוש
        </div>
        <div style="width:46px; height:46px; border-radius:50%; background:#FF2E9A; display:flex; align-items:center; justify-content:center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5Z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/></svg>
        </div>
        <div style="width:46px; height:46px; border-radius:50%; background:#FF2E9A; display:flex; align-items:center; justify-content:center; position:relative;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="#fff" stroke-width="2"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
          <div style="position:absolute; top:1px; right:2px; width:11px; height:11px; border-radius:50%; background:#FF3B30; border:2px solid #181A23;"></div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:6px; font-size:18px; font-weight:700;">
        וולקאם
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- hero -->
    <div style="margin:0 22px; height:166px; border-radius:26px; overflow:hidden; position:relative; background:radial-gradient(120% 120% at 85% 0%, #3a1230 0%, #1d1430 55%, #120f1c 100%);">
      <div style="position:absolute; inset:0; background:radial-gradient(60% 80% at 18% 110%, rgba(255,46,154,.45), transparent 70%);"></div>
      <div style="position:absolute; inset:0; padding:22px 24px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="align-self:flex-start; background:rgba(255,255,255,.14); backdrop-filter:blur(4px); padding:5px 12px; border-radius:20px; font-size:11.5px; font-weight:700; letter-spacing:.5px;">אירוע קהילה</div>
        <div>
          <div style="font-size:25px; font-weight:800; line-height:1.12;">ערב חברים<br>יום חמישי · 21:00</div>
          <div style="margin-top:8px; font-size:13px; font-weight:500; opacity:.78;">הצטרפו והביאו עוד חבר</div>
        </div>
      </div>
    </div>
    <div style="display:flex; gap:6px; justify-content:center; padding:12px 0 4px;">
      <div style="width:18px; height:5px; border-radius:3px; background:#FF2E9A;"></div>
      <div style="width:5px; height:5px; border-radius:3px; background:#3a3d4a;"></div>
      <div style="width:5px; height:5px; border-radius:3px; background:#3a3d4a;"></div>
      <div style="width:5px; height:5px; border-radius:3px; background:#3a3d4a;"></div>
    </div>

    <!-- quick actions -->
    <div style="padding:8px 22px 4px; display:grid; grid-template-columns:repeat(4,1fr); gap:11px;">
      <div style="background:#252836; border-radius:20px; padding:14px 6px; display:flex; flex-direction:column; align-items:center; gap:9px;">
        <div style="width:40px; height:40px; border-radius:50%; background:#FF2E9A; display:flex; align-items:center; justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg></div>
        <span style="font-size:11px; font-weight:600; text-align:center; line-height:1.2;">כל הפעולות</span>
      </div>
      <div style="background:#252836; border-radius:20px; padding:14px 6px; display:flex; flex-direction:column; align-items:center; gap:9px;">
        <div style="width:40px; height:40px; border-radius:50%; background:#2f3344; display:flex; align-items:center; justify-content:center;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.8.8 1 1.5 1 2.5h6c0-1 .2-1.7 1-2.5A6 6 0 0 0 12 3Z" stroke="#FF2E9A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span style="font-size:11px; font-weight:600; text-align:center; line-height:1.2;">יש לי רעיון</span>
      </div>
      <div style="background:#252836; border-radius:20px; padding:14px 6px; display:flex; flex-direction:column; align-items:center; gap:9px;">
        <div style="width:40px; height:40px; border-radius:50%; background:#2f3344; display:flex; align-items:center; justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2.5" stroke="#FF2E9A" stroke-width="2"/><path d="M9 8h6M9 12h6M9 16h4" stroke="#FF2E9A" stroke-width="2" stroke-linecap="round"/></svg></div>
        <span style="font-size:11px; font-weight:600; text-align:center; line-height:1.2;">מידע חשוב</span>
      </div>
      <div style="background:#252836; border-radius:20px; padding:14px 6px; display:flex; flex-direction:column; align-items:center; gap:9px;">
        <div style="width:40px; height:40px; border-radius:50%; background:#2f3344; display:flex; align-items:center; justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L20 13l1 4v2a2 2 0 0 1-2 2A15 15 0 0 1 4 8a2 2 0 0 1 1-4Z" stroke="#FF2E9A" stroke-width="2" stroke-linejoin="round"/></svg></div>
        <span style="font-size:11px; font-weight:600; text-align:center; line-height:1.2;">יצירת קשר</span>
      </div>
    </div>

    <!-- check-in status -->
    <div style="margin:14px 22px 4px; background:#252836; border-radius:20px; padding:14px 18px; display:flex; align-items:center; justify-content:space-between;">
      <div style="background:#D8F500; color:#181A23; font-weight:800; font-size:14px; padding:10px 20px; border-radius:22px;">צ'ק-אין</div>
      <div style="text-align:right;">
        <div style="font-size:15px; font-weight:700;">המועדון סגור עכשיו</div>
        <div style="display:flex; align-items:center; gap:6px; justify-content:flex-end; margin-top:3px;"><span style="font-size:12.5px; color:#9CA0AE; font-weight:500;">ראש חג · נפתח מחר 09:00</span><span style="width:8px; height:8px; border-radius:50%; background:#FF3B30;"></span></div>
      </div>
    </div>

    <!-- feed -->
    <div style="padding:16px 22px 0; display:flex; align-items:center; justify-content:space-between;">
      <span style="font-size:13px; font-weight:700; color:#FF2E9A;">הכל</span>
      <span style="font-size:19px; font-weight:800;">מה חדש</span>
    </div>
    <div style="padding:12px 22px 0; display:grid; grid-template-columns:1fr 1fr; gap:11px;">
      <div style="background:#252836; border-radius:20px; padding:14px; height:128px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="display:flex; align-items:flex-start; justify-content:space-between;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2.5" stroke="#9CA0AE" stroke-width="2"/><path d="M4 9h16M8 3v3M16 3v3" stroke="#9CA0AE" stroke-width="2" stroke-linecap="round"/></svg>
          <div style="width:26px; height:26px; border-radius:50%; background:#FF2E9A; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800;">5</div>
        </div>
        <div>
          <div style="font-size:11px; font-weight:700; color:#FF2E9A;">יום שבת · 30 במאי</div>
          <div style="font-size:13.5px; font-weight:700; line-height:1.25; margin-top:3px;">פתיחת שנת הפעילות תשפ״ו</div>
        </div>
      </div>
      <div style="background:#252836; border-radius:20px; padding:14px; height:128px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="display:flex; align-items:flex-start; justify-content:space-between;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 9l11-4v14L4 15H3a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h1Z" stroke="#9CA0AE" stroke-width="2" stroke-linejoin="round"/><path d="M18 8a4 4 0 0 1 0 8" stroke="#9CA0AE" stroke-width="2" stroke-linecap="round"/></svg>
          <div style="width:26px; height:26px; border-radius:50%; background:#FF2E9A; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800;">2</div>
        </div>
        <div>
          <div style="font-size:11px; font-weight:700; color:#9CA0AE;">לפני 2 שעות</div>
          <div style="font-size:13.5px; font-weight:700; line-height:1.25; margin-top:3px;">עדכון חדש מהוועד</div>
        </div>
      </div>
    </div>

    <!-- bottom nav -->
    <div style="position:absolute; bottom:0; left:0; right:0; background:#1B1D27; padding:12px 40px 26px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid #262936;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 11l8-6 8 6v8a1 1 0 0 1-1 1h-4v-5h-6v5H5a1 1 0 0 1-1-1v-8Z" stroke="#FF2E9A" stroke-width="2" stroke-linejoin="round" fill="#FF2E9A"/></svg><span style="font-size:11px; font-weight:700; color:#FF2E9A;">בית</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="9" width="16" height="11" rx="2" stroke="#7C808E" stroke-width="2"/><path d="M4 9V8a4 4 0 0 1 8 0 4 4 0 0 1 8 0v1M12 9v11" stroke="#7C808E" stroke-width="2"/></svg><span style="font-size:11px; font-weight:600; color:#7C808E;">הטבות</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" stroke="#7C808E" stroke-width="2" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="#7C808E" stroke-width="2"/></svg><span style="font-size:11px; font-weight:600; color:#7C808E;">עדכונים</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="#7C808E" stroke-width="2"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5" stroke="#7C808E" stroke-width="2" stroke-linecap="round"/></svg><span style="font-size:11px; font-weight:600; color:#7C808E;">פרופיל</span></div>
    </div>
    <div style="position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:130px; height:5px; border-radius:3px; background:#FF2E9A;"></div>
  </div>

</div>
</x-dc>
</body>
</html>
