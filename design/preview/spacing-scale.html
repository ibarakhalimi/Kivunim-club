<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .scale { display: flex; align-items: flex-end; gap: 12px; direction: ltr; align-self: center; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .block { background: var(--magenta-500); border-radius: 4px; width: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--fg-4); }
</style></head>
<body>
  <div class="head">מרווחים — בסיס 4px</div>
  <div class="scale">
    <div class="step"><div class="block" style="height:4px"></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="step"><div class="block" style="height:8px"></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="step"><div class="block" style="height:12px"></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="step"><div class="block" style="height:16px"></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="step"><div class="block" style="height:20px"></div><div class="lbl">5</div><div class="px">20</div></div>
    <div class="step"><div class="block" style="height:24px"></div><div class="lbl">6</div><div class="px">24</div></div>
    <div class="step"><div class="block" style="height:32px"></div><div class="lbl">8</div><div class="px">32</div></div>
    <div class="step"><div class="block" style="height:40px"></div><div class="lbl">10</div><div class="px">40</div></div>
    <div class="step"><div class="block" style="height:48px"></div><div class="lbl">12</div><div class="px">48</div></div>
    <div class="step"><div class="block" style="height:64px"></div><div class="lbl">16</div><div class="px">64</div></div>
    <div class="step"><div class="block" style="height:80px"></div><div class="lbl">20</div><div class="px">80</div></div>
    <div class="step"><div class="block" style="height:96px"></div><div class="lbl">24</div><div class="px">96</div></div>
  </div>
</body></html>
