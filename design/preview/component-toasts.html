<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); height: 240px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .toast {
    display: flex; align-items: center; gap: 12px;
    background: var(--neutral-900); color: white;
    border-radius: 16px; padding: 12px 16px;
    box-shadow: var(--shadow-lg);
    max-width: 420px;
  }
  .toast .ic { width: 28px; height: 28px; border-radius: 999px; background: var(--magenta-500); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toast .ic svg { width: 14px; height: 14px; stroke: white; stroke-width: 3; fill: none; }
  .toast .b { display: flex; flex-direction: column; gap: 1px; flex: 1; }
  .toast .title { font-family: var(--font-sans); font-size: 14px; font-weight: 600; }
  .toast .sub { font-family: var(--font-sans); font-size: 12px; opacity: 0.7; }
  .toast .action { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--pink-400); padding: 6px 10px; border-radius: 999px; cursor: pointer; }
  .banner {
    background: var(--bg-tint); border: 1px solid var(--magenta-200);
    color: var(--magenta-800); padding: 12px 14px; border-radius: 14px;
    display: flex; align-items: center; gap: 12px; max-width: 560px;
  }
  .banner svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--magenta-600); }
  .banner .text { font-family: var(--font-sans); font-size: 13px; flex: 1; }
  .banner .text strong { font-weight: 600; }
  .banner button { font-family: var(--font-sans); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 999px; background: var(--magenta-500); color: white; border: none; cursor: pointer; }
</style></head>
<body>
  <div class="head">טוסטים ובאנרים</div>
  <div class="toast">
    <div class="ic"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 10,18 20,6"/></svg></div>
    <div class="b"><div class="title">את בפנים</div><div class="sub">אישור הגעה לארוחת הגג של חמישי</div></div>
    <div class="action">צפיה</div>
  </div>
  <div class="banner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 9 7H4l4 4-2 7 6-4 6 4-2-7 4-4h-5z"/></svg>
    <div class="text">את <strong>3 אירועים</strong> משלב <strong>המייסדים</strong>. ארוחה חופשית מחכה.</div>
    <button>הראה דרך</button>
  </div>
</body></html>
