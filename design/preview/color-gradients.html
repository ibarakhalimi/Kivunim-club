<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); height: 240px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); direction: ltr; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex: 1; }
  .tile { border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px; }
  .tile .lab { font-family: var(--font-sans); font-size: 13px; font-weight: 600; }
  .tile .var { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; direction: ltr; }
</style></head>
<body>
  <div class="head"><div class="name">גרדיאנטים מותגיים</div><div class="meta">לרגעי שיא בלבד</div></div>
  <div class="row">
    <div class="tile" style="background:var(--grad-primary); color: white"><div></div><div><div class="lab">ראשי</div><div class="var">--grad-primary</div></div></div>
    <div class="tile" style="background:var(--grad-soft); color: var(--magenta-800)"><div></div><div><div class="lab">רך</div><div class="var">--grad-soft</div></div></div>
    <div class="tile" style="background:var(--grad-card); color: white"><div></div><div><div class="lab">כרטיס</div><div class="var">--grad-card</div></div></div>
    <div class="tile" style="background:var(--grad-glow); color: white"><div></div><div><div class="lab">זוהר</div><div class="var">--grad-glow</div></div></div>
  </div>
</body></html>
