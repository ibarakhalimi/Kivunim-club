<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); direction: ltr; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; }
  .tile { border-radius: 14px; padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; gap: 4px; box-shadow: inset 0 0 0 1px var(--border-subtle); }
  .tile .lab { font-family: var(--font-sans); font-size: 12px; font-weight: 600; }
  .tile .var { font-family: var(--font-mono); font-size: 9px; opacity: 0.65; direction: ltr; }
</style></head>
<body>
  <div class="head"><div class="name">משטחים — תצוגה בהירה</div><div class="meta">canvas → tint</div></div>
  <div class="row">
    <div class="tile" style="background:var(--bg-canvas); color: var(--fg-1)"><div class="lab">קנבס</div><div class="var">--bg-canvas</div></div>
    <div class="tile" style="background:var(--bg-surface); color: var(--fg-1)"><div class="lab">משטח</div><div class="var">--bg-surface</div></div>
    <div class="tile" style="background:var(--bg-sunken); color: var(--fg-1)"><div class="lab">שקוע</div><div class="var">--bg-sunken</div></div>
    <div class="tile" style="background:var(--bg-tint); color: var(--fg-on-tint)"><div class="lab">גוון</div><div class="var">--bg-tint</div></div>
    <div class="tile" style="background:var(--grad-primary); color: white; box-shadow:none"><div class="lab">מותג</div><div class="var">--grad-primary</div></div>
  </div>
</body></html>
