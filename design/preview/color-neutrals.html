<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); height: 200px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); direction: ltr; }
  .row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; }
  .sw { aspect-ratio: 1; border-radius: 8px; position: relative; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04); }
  .sw .step { position: absolute; top: 4px; right: 4px; font-family: var(--font-mono); font-size: 8px; color: rgba(255,255,255,0.75); direction: ltr; }
  .sw .step.dark { color: rgba(0,0,0,0.35); }
</style></head>
<body>
  <div class="head">
    <div class="name">ניטרלים — חמים, גוון ורוד</div>
    <div class="meta">--neutral-0 → 950</div>
  </div>
  <div class="row">
    <div class="sw" style="background:var(--neutral-0); box-shadow: inset 0 0 0 1px var(--border-default)"><span class="step dark">0</span></div>
    <div class="sw" style="background:var(--neutral-25)"><span class="step dark">25</span></div>
    <div class="sw" style="background:var(--neutral-50)"><span class="step dark">50</span></div>
    <div class="sw" style="background:var(--neutral-100)"><span class="step dark">100</span></div>
    <div class="sw" style="background:var(--neutral-200)"><span class="step dark">200</span></div>
    <div class="sw" style="background:var(--neutral-300)"><span class="step dark">300</span></div>
    <div class="sw" style="background:var(--neutral-400)"><span class="step dark">400</span></div>
    <div class="sw" style="background:var(--neutral-500)"><span class="step">500</span></div>
    <div class="sw" style="background:var(--neutral-600)"><span class="step">600</span></div>
    <div class="sw" style="background:var(--neutral-700)"><span class="step">700</span></div>
    <div class="sw" style="background:var(--neutral-800)"><span class="step">800</span></div>
    <div class="sw" style="background:var(--neutral-900)"><span class="step">900</span></div>
    <div class="sw" style="background:var(--neutral-950)"><span class="step">950</span></div>
  </div>
</body></html>
