<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); height: 340px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
  .card {
    width: 380px; height: 240px; border-radius: 28px;
    background: var(--grad-glow);
    color: white;
    box-shadow: var(--shadow-card);
    padding: 24px 26px;
    box-sizing: border-box;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 90% 110%, rgba(255,255,255,0.18), transparent 60%);
    pointer-events: none;
  }
  .top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1; }
  .brand-row { display: flex; flex-direction: column; gap: 2px; }
  .brand { font-family: var(--font-display); font-weight: 500; font-size: 28px; line-height: 1; letter-spacing: -0.02em; }
  .word { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.16em; opacity: 0.78; font-weight: 500; }
  .tier { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.06em; font-weight: 600; padding: 5px 12px; border-radius: 999px; background: rgba(255,255,255,0.18); backdrop-filter: blur(8px); }
  .mid { position: relative; z-index: 1; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 36px; line-height: 1; letter-spacing: -0.025em; }
  .bot { display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 1; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field .l { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.08em; opacity: 0.68; font-weight: 500; }
  .field .v { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.04em; direction: ltr; }
</style></head>
<body>
  <div class="card">
    <div class="top">
      <div class="brand-row">
        <div class="brand">כ.</div>
        <div class="word">כיוונים · מועדון</div>
      </div>
      <div class="tier">מייסדים</div>
    </div>
    <div class="mid">
      <div class="name">עדה שטרן</div>
    </div>
    <div class="bot">
      <div class="field"><div class="l">מספר חבר</div><div class="v">KVN-2K6-4F71</div></div>
      <div class="field" style="text-align: left"><div class="l">מאז</div><div class="v">04/2024</div></div>
    </div>
  </div>
</body></html>
