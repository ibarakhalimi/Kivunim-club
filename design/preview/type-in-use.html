<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 36px; background: var(--bg-canvas); height: 280px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--magenta-600); }
  .title { font-family: var(--font-display); font-weight: 500; font-size: 64px; line-height: 1; letter-spacing: -0.02em; color: var(--fg-1); }
  .title em { font-style: normal; color: var(--magenta-600); }
  .desc { font-family: var(--font-sans); font-size: 17px; line-height: 1.5; color: var(--fg-2); max-width: 580px; }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); display: flex; gap: 18px; direction: ltr; flex-wrap: wrap; }
  .meta span::before { content: "·"; margin-left: 12px; color: var(--neutral-400); }
  .meta span:first-child::before { display: none; }
</style></head>
<body>
  <div class="eyebrow">הערב בעיר שלכם</div>
  <div class="title">גג, <em>באור נרות.</em></div>
  <div class="desc">שבעה-עשר חברים. שולחן ארוך אחד. יין מהמקום באלנבי. הביאו את החברה שכל הזמן רציתם להתקשר אליה.</div>
  <div class="meta"><span>חמישי 04/12</span><span>19:30</span><span>פלורנטין</span><span>17 / 24</span></div>
</body></html>
