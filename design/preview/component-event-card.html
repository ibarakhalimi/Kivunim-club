<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); height: 280px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
  .card {
    width: 460px; background: var(--bg-surface);
    border-radius: 20px; padding: 18px; border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-md);
    display: flex; gap: 16px; align-items: stretch;
  }
  .img {
    width: 110px; flex-shrink: 0; border-radius: 14px;
    background: linear-gradient(160deg, var(--magenta-400) 0%, var(--purple-600) 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 12px 12px;
    color: white;
  }
  .img .month { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; opacity: 0.85; direction: ltr; }
  .img .day   { font-family: var(--font-display); font-weight: 500; font-size: 56px; line-height: 1; direction: ltr; }
  .body { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--magenta-600); }
  .title { font-family: var(--font-display); font-weight: 500; font-size: 26px; line-height: 1.05; letter-spacing: -0.015em; color: var(--fg-1); }
  .title em { font-style: normal; color: var(--magenta-600); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); display: flex; gap: 12px; }
  .meta span::before { content: "·"; margin-left: 12px; color: var(--neutral-400); }
  .meta span:first-child::before { display: none; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 8px; }
  .stack { display: flex; align-items: center; gap: 8px; }
  .av { width: 22px; height: 22px; border-radius: 999px; box-shadow: 0 0 0 2px white; }
  .av:not(:first-child) { margin-right: -8px; }
  .a1 { background: linear-gradient(135deg, var(--magenta-500), var(--pink-500)); }
  .a2 { background: linear-gradient(135deg, var(--purple-500), var(--magenta-600)); }
  .a3 { background: linear-gradient(135deg, var(--pink-500), var(--purple-500)); }
  .going { font-family: var(--font-sans); font-size: 12px; color: var(--fg-2); margin-right: 6px; }
  .btn { font-family: var(--font-sans); font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 999px; background: var(--magenta-500); color: white; border: none; cursor: pointer; }
</style></head>
<body>
  <div class="card">
    <div class="img">
      <div class="month">APR</div>
      <div class="day">12</div>
    </div>
    <div class="body">
      <div class="eyebrow">הערב · 19:30</div>
      <div class="title">גג, <em>באור נרות.</em></div>
      <div class="meta"><span>פלורנטין</span><span>17 מגיעים</span><span>+1 בסדר</span></div>
      <div class="foot">
        <div class="stack">
          <div class="av a1"></div><div class="av a2"></div><div class="av a3"></div>
          <span class="going">+14 מגיעים</span>
        </div>
        <button class="btn">אישור הגעה</button>
      </div>
    </div>
  </div>
</body></html>
