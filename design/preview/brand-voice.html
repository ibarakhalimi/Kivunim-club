<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); height: 240px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; }
  .yes { color: var(--magenta-700); }
  .no { color: var(--neutral-500); }
  .ex { font-family: var(--font-sans); font-size: 14px; line-height: 1.45; padding: 10px 14px; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-subtle); }
  .ex.bad { color: var(--neutral-500); text-decoration: line-through; text-decoration-color: var(--danger-500); }
  .ex em { font-style: normal; color: var(--magenta-700); font-family: var(--font-display); font-size: 16px; }
  .ex strong { font-weight: 600; color: var(--magenta-700); }
</style></head>
<body>
  <div class="col">
    <div class="label yes">▲ ככה כותבים</div>
    <div class="ex">את <strong>3 אירועים</strong> משלב המייסדים.</div>
    <div class="ex"><em>הערב,</em> על הגג. אישור הגעה נסגר ב-18:00.</div>
    <div class="ex">אין אירועים השבוע. נשלח SMS כשמשהו ייפתח.</div>
  </div>
  <div class="col">
    <div class="label no">✕ לא ככה</div>
    <div class="ex bad">לחצו עכשיו לפתיחת הטבות פרימיום!</div>
    <div class="ex bad">🎉 כל הכבוד! 🚀 ברוכים הבאים! 🎊</div>
    <div class="ex bad">שגיאה: קלט לא חוקי. נסה שוב.</div>
  </div>
</body></html>
