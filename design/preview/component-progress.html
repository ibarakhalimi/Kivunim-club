<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); height: 240px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .progress {
    background: var(--bg-surface); border: 1px solid var(--border-subtle);
    border-radius: 18px; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow-sm);
  }
  .top { display: flex; justify-content: space-between; align-items: baseline; }
  .label { font-family: var(--font-sans); font-size: 13px; font-weight: 550; color: var(--fg-1); }
  .label em { font-style: normal; font-family: var(--font-display); color: var(--magenta-600); font-weight: 500; }
  .value { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); direction: ltr; }
  .bar { height: 8px; background: var(--bg-sunken); border-radius: 999px; overflow: hidden; position: relative; }
  .fill { height: 100%; background: var(--grad-primary); border-radius: 999px; float: right; }
  .ticks { display: flex; justify-content: space-between; font-family: var(--font-sans); font-size: 11px; color: var(--fg-4); font-weight: 500; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .stat .n { font-family: var(--font-mono); font-size: 22px; color: var(--fg-1); font-weight: 500; letter-spacing: -0.02em; direction: ltr; }
  .stat .l { font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; font-weight: 600; }
  .stat .d { font-family: var(--font-sans); font-size: 11px; color: var(--success-500); font-weight: 600; }
</style></head>
<body>
  <div class="head">התקדמות ומדדים</div>
  <div class="progress">
    <div class="top">
      <div class="label">הדרך ל-<em>מייסדים</em></div>
      <div class="value">7 / 10 אירועים</div>
    </div>
    <div class="bar"><div class="fill" style="width: 70%"></div></div>
    <div class="ticks"><span>ניסיון</span><span>ליבה</span><span style="color: var(--magenta-600); font-weight: 600;">פריים ●</span><span>מייסדים</span></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="n">42</div><div class="l">אירועים</div><div class="d">+3 החודש</div></div>
    <div class="stat"><div class="n">₪4.8k</div><div class="l">חסכת</div><div class="d">דרך הטבות</div></div>
    <div class="stat"><div class="n">217</div><div class="l">פגישות</div><div class="d">+12</div></div>
    <div class="stat"><div class="n">2 שנים</div><div class="l">חברה</div><div class="d">מאז 04/24</div></div>
  </div>
</body></html>
