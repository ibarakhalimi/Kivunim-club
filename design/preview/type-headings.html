<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 36px; background: var(--bg-canvas); height: 320px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .row .label { width: 80px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); direction: ltr; }
  .row .text { color: var(--fg-1); font-family: var(--font-display); }
  .h1 { font-size: 48px; line-height: 1.05; letter-spacing: -0.02em; font-weight: 700; }
  .h2 { font-size: 38px; line-height: 1.1; letter-spacing: -0.015em; font-weight: 700; }
  .h3 { font-size: 30px; line-height: 1.15; letter-spacing: -0.01em; font-weight: 500; }
  .h4 { font-family: var(--font-sans); font-size: 24px; line-height: 1.25; font-weight: 600; }
  .h5 { font-family: var(--font-sans); font-size: 20px; line-height: 1.3; font-weight: 600; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 4px; }
</style></head>
<body>
  <div class="head">כותרות — Frank Ruhl Libre + Heebo</div>
  <div class="row"><span class="label">H1 · 48</span><span class="text h1">הערב על הגג</span></div>
  <div class="row"><span class="label">H2 · 38</span><span class="text h2">השבוע בעיר</span></div>
  <div class="row"><span class="label">H3 · 30</span><span class="text h3">בחרו הטבה לפדיון</span></div>
  <div class="row"><span class="label">H4 · 24</span><span class="text h4">ארוחת מייסדים — חמישי</span></div>
  <div class="row"><span class="label">H5 · 20</span><span class="text h5">חברים שיגיעו הערב</span></div>
</body></html>
