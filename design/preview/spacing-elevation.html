<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-canvas); height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .head { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .row { display: flex; align-items: center; justify-content: space-around; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 80px; height: 80px; background: var(--bg-surface); border-radius: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); direction: ltr; }
  .lbl small { color: var(--fg-3); font-size: 9px; display: block; margin-top: 2px; }
</style></head>
<body>
  <div class="head">הצללות — חמות, גוון ורוד</div>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xs)"></div><div class="lbl">xs<small>0 1 2</small></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm)"></div><div class="lbl">sm<small>0 2 4</small></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md)"></div><div class="lbl">md<small>0 4 12</small></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg)"></div><div class="lbl">lg<small>0 12 32</small></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xl)"></div><div class="lbl">xl<small>0 24 64</small></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-glow); background: var(--magenta-500)"></div><div class="lbl">glow<small>focus halo</small></div></div>
  </div>
</body></html>
