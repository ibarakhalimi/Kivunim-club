<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); height: 180px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); direction: ltr; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { aspect-ratio: 1.2; border-radius: 12px; position: relative; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04); display: flex; flex-direction: column; justify-content: space-between; padding: 8px 10px; box-sizing: border-box; }
  .sw .top { font-family: var(--font-mono); font-size: 9px; color: rgba(255,255,255,0.85); direction: ltr; }
  .sw .top.dark { color: rgba(0,0,0,0.55); }
  .sw .label { font-family: var(--font-display); font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.95); }
  .sw .label.dark { color: rgba(0,0,0,0.85); }
</style></head>
<body>
  <div class="head">
    <div class="name">ורוד</div>
    <div class="meta">--pink-50 → 600 · hue 10</div>
  </div>
  <div class="row">
    <div class="sw" style="background:var(--pink-50)"><span class="top dark">50</span><span class="label dark">לחישה</span></div>
    <div class="sw" style="background:var(--pink-200)"><span class="top dark">200</span><span class="label dark">פריחה</span></div>
    <div class="sw" style="background:var(--pink-400)"><span class="top">400</span><span class="label">פיוני</span></div>
    <div class="sw" style="background:var(--pink-500)"><span class="top">500</span><span class="label">לוהט</span></div>
    <div class="sw" style="background:var(--pink-600)"><span class="top">600</span><span class="label">עמוק</span></div>
  </div>
</body></html>
