<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 36px; background: var(--bg-canvas); height: 260px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); }
  .spec { font-family: var(--font-display); font-weight: 400; font-size: 96px; line-height: 0.95; letter-spacing: -0.025em; color: var(--fg-1); }
  .spec em { font-style: normal; color: var(--magenta-600); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); direction: ltr; }
</style></head>
<body>
  <div class="label">דיספליי — Frank Ruhl Libre</div>
  <div class="spec">מצאו את <em>הכיוון</em>.</div>
  <div class="meta">font-family: "Frank Ruhl Libre" · 400 / 700 · -0.025em tracking</div>
</body></html>
