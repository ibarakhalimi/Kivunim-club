<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <title>מועדון כיוונים</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background:
        radial-gradient(60% 50% at 20% 10%, oklch(0.92 0.08 340 / 0.5), transparent 60%),
        radial-gradient(60% 50% at 90% 90%, oklch(0.90 0.08 305 / 0.4), transparent 60%),
        oklch(0.97 0.012 340);
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
      font-family: var(--font-sans);
      direction: rtl;
    }
    body { box-sizing: border-box; }
    .wrap { display: flex; flex-direction: column; gap: 24px; align-items: center; }
    .legend { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.06em; direction: ltr; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="legend">Kivunim · Club — interactive prototype</div>
    <div id="app-root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-card.jsx"></script>
  <script type="text/babel" src="screens-other.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
